<?xml version="1.0"?>
<!DOCTYPE fontconfig SYSTEM "fonts.dtd">
<fontconfig>
    <!-- Set Ubuntu as the default font -->
    <match target="pattern">
        <edit name="family" mode="prepend">
            <string>Ubuntu</string>
        </edit>
    </match>

    <!-- Use Font Awesome 6 Free for emoji -->
    <match target="pattern">
        <test name="family">
            <string>Font Awesome 6 Free</string>
        </test>
        <edit name="family" mode="assign">
            <string>Font Awesome 6 Free</string>
        </edit>
    </match>

    <!-- Fallback to other fonts if Ubuntu is not available -->
    <match target="font">
        <edit name="family" mode="append">
            <string>Ubuntu</string>
        </edit>
    </match>
</fontconfig>
