# General options
set-option -g default-terminal 'screen-256color'
set-option -g terminal-overrides ',xterm-256color:RGB'
set -g focus-events on
set -g status-position top
set -s escape-time 0
set -g status-interval 5
set -g status-right-length 100
setw -g mode-keys vi
set -g mouse off
set -g base-index 1
set -g pane-base-index 1
set-window-option -g pane-base-index 1
set-option -g renumber-windows on

# Shift arrow to switch windows
bind -n S-Left  previous-window
bind -n S-Right next-window

# Configure the catppuccin plugin
set -g @catppuccin_flavor "mocha"
set -g @catppuccin_window_status_style "rounded"
set -g @catppuccin_window_left_separator ""
set -g @catppuccin_window_right_separator " "
set -g @catppuccin_window_middle_separator " █"
set -g @catppuccin_window_number_position "right"
set -g @catppuccin_window_default_fill "number"
set -ogq @catppuccin_window_current_text " #W"
set -g @catppuccin_window_current_fill "number"
set -ogq @catppuccin_pane_status_enabled "yes" # set to "yes" to enable
set -ogq @catppuccin_pane_border_status "yes" # set to "yes" to enable
set -g @catppuccin_date_time_text "%H:%M"
set -g status-right "#{E:@catppuccin_status_directory}#{E:@catppuccin_status_date_time}"
set -g status-left ""

# Load plugins
run '~/.config/tmux/plugins/catppuccin/tmux/catppuccin.tmux'
