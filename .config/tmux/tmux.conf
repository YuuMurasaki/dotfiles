set -sa terminal-features ",xterm-256color:RGB"
set -g allow-passthrough on
set -g default-command "${SHELL}"
set -g renumber-windows on
set -g escape-time 0
set-window-option -g mode-keys vi

# style
set -g status-position top
set -g status-justify absolute-centre
set -g status-style 'fg=color7 bg=default'
set -g status-right ''
set -g status-left '#S'
set -g status-left-style 'fg=color12'
setw -g window-status-current-style 'fg=colour13 bg=default bold'
setw -g window-status-current-format '#I:#W '
setw -g window-status-style 'fg=color8'

# keybinding
bind-key -n S-down new-window
bind-key -n S-left prev
bind-key -n S-right next
bind-key -n C-left swap-window -t -1
bind-key -n C-right swap-window -t +1

bind-key b set-option status
bind-key r source-file ~/.config/tmux/tmux.conf

bind-key v copy-mode
bind-key -T copy-mode-vi v send -X begin-selection
bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "xclip -i -sel clip > /dev/null"

bind-key f run-shell "tmux neww ~/.local/bin/tms"
bind-key D run-shell "~/.local/bin/tms ~/dotfiles"
