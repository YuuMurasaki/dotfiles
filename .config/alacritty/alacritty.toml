import = [
    "~/.config/alacritty/catppuccin/catppuccin-mocha.toml",
]

[env]
TERM = "xterm-256color"

[shell]
program = "/usr/bin/bash"
args = ["-l"]

[window]
decorations = "None"
decorations_theme_variant = "Dark"

[scrolling]
history = 1000
multiplier = 5

[font]
normal.family = "Hack Nerd Font Mono"
size = 14

[mouse]
hide_when_typing = true
