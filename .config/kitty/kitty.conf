# Include theme
include kitty_theme.conf

# Font Settings
font_family	FiraMono Nerd Font Mono
italic_font 	FiraMono Nerd Font Italic
bold_font   	FiraMono Nerd Font Bold
bold_italic_font FiraMono Nerd Font Bold Italic
font_size	13.0

# Shell
shell fish

# Cursos Settings
cursor_shape beam 
cursor_beam_thickness 1.8
scrollback_lines 1000

# Tab Behaviour
tab_bar_min_tabs            1
tab_bar_edge                bottom
tab_bar_style               powerline
tab_powerline_style         slanted
tab_title_template          {title}{' :{}:'.format(num_windows) if num_windows > 1 else ''}
